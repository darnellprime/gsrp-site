<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSRP Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    text-align:center;
}

.btn{
    padding:12px 25px;
    background:white;
    color:black;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-weight:600;
    margin-top:20px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.card{
    background:rgba(255,255,255,0.05);
    padding:40px;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="card">
    <h1>Golden State RP</h1>
    <p>Personal Admin Login</p>

    <!-- Replace with your backend worker URL -->
    <button class="btn" onclick="loginWithDiscord()">
        Login with Discord
    </button>
</div>

<script>

// ?? Replace this with your backend URL
const BACKEND_URL = "https://YOUR-WORKER-URL";

function loginWithDiscord(){
    window.location.href = BACKEND_URL + "/login";
}

// Optional: handle redirect after login
window.onload = async function(){
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if(code){
        // Send code to backend for verification
        const response = await fetch(BACKEND_URL + "/callback?code=" + code);
        const user = await response.json();

        // ?? Replace with YOUR Discord ID
        const YOUR_DISCORD_ID = "YOUR_DISCORD_ID";

        if(user.id !== YOUR_DISCORD_ID){
            alert("Access denied.");
            return;
        }

        // Save login
        localStorage.setItem("gsrp_user", JSON.stringify(user));

        // Redirect to dashboard or home
        window.location.href = "index.html";
    }
}

</script>

</body>
</html>
