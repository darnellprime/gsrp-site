<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Center</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:'Poppins',sans-serif;
    text-align:center;
    padding:80px 20px;
}

h1{
    font-size:50px;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:12px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border-radius:25px;
    border:none;
    background:white;
    color:black;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<h1>Application Center</h1>

<div class="grid">

<div class="card">
<h3>SASP</h3>
<button onclick="openApply('SASP')">Apply</button>
</div>

<div class="card">
<h3>BCSO</h3>
<button onclick="openApply('BCSO')">Apply</button>
</div>

<div class="card">
<h3>LSPD</h3>
<button onclick="openApply('LSPD')">Apply</button>
</div>

<div class="card">
<h3>Staff</h3>
<button onclick="openApply('Staff')">Apply</button>
</div>

<div class="card">
<h3>Gang / Organization</h3>
<button onclick="openApply('Organization')">Apply</button>
</div>

<div class="card">
<h3>Government / DOJ</h3>
<button onclick="openApply('Government')">Apply</button>
</div>

</div>

<script>
function openApply(type){
    window.open("apply.html?type=" + type, "_blank");
}
</script>

</body>
</html>
