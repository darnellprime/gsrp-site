<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden State RP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
    overflow:hidden;
    cursor:none;
}

/* LOADING SCREEN */
#loadingScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:99999;
    transition:opacity 0.8s ease;
}

#loadingLogo{
    width:180px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

#loadingBar{
    width:250px;
    height:4px;
    background:#222;
    margin-top:25px;
    border-radius:10px;
    overflow:hidden;
}

#loadingProgress{
    width:0%;
    height:100%;
    background:white;
    animation:load 2.5s forwards;
}

@keyframes load{
    to{width:100%;}
}

/* MAIN CONTENT */
#mainContent{
    opacity:0;
    transition:opacity 1s ease;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    padding:12px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:1000;
}

nav img{
    height:95px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:25px;
}

nav ul li{
    cursor:pointer;
    transition:0.3s;
}

nav ul li:hover{
    color:#aaa;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 20px;
}

.hero h1{
    font-size:65px;
    font-weight:800;
}

.hero p{
    margin-top:15px;
    color:#bbb;
}

/* BUTTON */
.btn{
    padding:12px 26px;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
    background:white;
    color:black;
    display:inline-block;
    margin-top:25px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* PARTICLES */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-2;
}

/* CURSOR */
#cursor{
    position:fixed;
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:10000;
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
    <img src="logo.png" id="loadingLogo">
    <div id="loadingBar">
        <div id="loadingProgress"></div>
    </div>
</div>

<div id="mainContent">

<div id="cursor"></div>
<canvas id="particles"></canvas>

<!-- NAVIGATION -->
<nav>
    <img src="logo.png">
    <ul>
        <li onclick="location.href='index.html'">Home</li>
        <li onclick="window.open('YOUR_DISCORD_LINK','_blank')">Discord</li>
        <li onclick="location.href='applications.html'">Applications</li>
        <li onclick="location.href='tickets.html'">Tickets</li>
        <li onclick="window.open('https://cfx.re/join/YOUR_CODE','_blank')">Connect</li>
    </ul>
</nav>

<div class="hero">
    <h1>GOLDEN STATE RP</h1>
    <p>Professional Roleplay Ģ Custom Systems Ģ Community Driven</p>

    <a href="applications.html" class="btn">Application Center</a>
</div>

</div>

<script>

/* REMOVE LOADING */
window.addEventListener("load",()=>{
    setTimeout(()=>{
        document.getElementById("loadingScreen").style.opacity="0";
        document.getElementById("mainContent").style.opacity="1";
        setTimeout(()=>{
            document.getElementById("loadingScreen").style.display="none";
        },800);
    },2500);
});

/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
    cursor.style.left=e.clientX+"px";
    cursor.style.top=e.clientY+"px";
});

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
for(let i=0;i<90;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        s:Math.random()*2+1,
        vx:(Math.random()-0.5),
        vy:(Math.random()-0.5)
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>canvas.width) p.vx*=-1;
        if(p.y<0||p.y>canvas.height) p.vy*=-1;

        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.s,0,Math.PI*2);
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
