<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden State RP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="brand">Golden State RP</div>
    <button class="discord-login" onclick="discordLogin()">
        Login with Discord
    </button>
</nav>

<section class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
        <h1>Golden State RP</h1>
        <p>Built for Roleplay. Designed for Community.</p>
    </div>
</section>

<section class="section">
    <h2>Community Access</h2>

    <div class="card-grid">
        <div class="card">
            <h3>Support</h3>
            <p>Create a support ticket.</p>
            <button onclick="openTicket('Support')">Open</button>
        </div>

        <div class="card">
            <h3>Applications</h3>
            <p>Join our departments or staff team.</p>
            <button onclick="openApplication()">Apply</button>
        </div>
    </div>
</section>

<footer>
    © 2026 Golden State RP
</footer>

<script src="script.js"></script>
</body>
</html>
