<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Golden State RP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#0a0a0a;
    color:white;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    padding:12px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:1000;
}

nav img{
    height:95px; /* BIGGER LOGO */
}

nav ul{
    list-style:none;
    display:flex;
    gap:25px;
}

nav ul li{
    cursor:pointer;
    transition:0.3s;
}

nav ul li:hover{
    color:#aaa;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 20px;
    background:radial-gradient(circle at center,#1a1a1a,#000);
}

.hero h1{
    font-size:65px;
    font-weight:800;
}

.hero p{
    margin-top:15px;
    color:#bbb;
    max-width:650px;
}

/* BUTTONS */
.buttons{
    margin-top:30px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    padding:12px 26px;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.btn-primary{
    background:white;
    color:black;
}

.btn-primary:hover{
    transform:scale(1.07);
}

.btn-outline{
    border:1px solid white;
    color:white;
}

.btn-outline:hover{
    background:white;
    color:black;
}
</style>
</head>

<body>

<nav>
    <img src="logo.png" alt="Logo">
    <ul>
        <li onclick="location.href='index.html'">Home</li>
        <li onclick="location.href='applications.html'">Application Center</li>
    </ul>
</nav>

<div class="hero">
    <h1>GOLDEN STATE RP</h1>
    <p>Professional Roleplay • Departments • Custom Systems • Community Driven</p>

    <div class="buttons">
        <!-- DISCORD LINK -->
        <a href="YOUR_DISCORD_INVITE_LINK" target="_blank" class="btn btn-primary">
            Join Discord
        </a>

        <!-- CFX LINK -->
        <a href="https://cfx.re/join/YOUR_CODE" target="_blank" class="btn btn-outline">
            Connect to Server
        </a>
    </div>
</div>

</body>
</html>
