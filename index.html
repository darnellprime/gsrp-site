<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden State RP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
    overflow:hidden;
    cursor:none;
}

/* LOADING SCREEN */
#loadingScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:99999;
    transition:opacity 0.8s ease;
}

#loadingLogo{
    width:180px;
    animation: pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

#loadingBar{
    width:250px;
    height:4px;
    background:#222;
    margin-top:25px;
    overflow:hidden;
    border-radius:10px;
}

#loadingProgress{
    width:0%;
    height:100%;
    background:white;
    animation: load 2.5s forwards;
}

@keyframes load{
    to{width:100%;}
}

/* MAIN CONTENT */
#mainContent{
    opacity:0;
    transition:opacity 1s ease;
}

/* CURSOR */
#cursor{
    position:fixed;
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:10000;
}

/* PARTICLES */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-2;
}

/* SERVER STATUS */
#serverStatus{
    margin-top:25px;
    font-size:18px;
}

.btn{
    padding:12px 26px;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
    background:white;
    color:black;
    display:inline-block;
    margin-top:20px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
    <img src="logo.png" id="loadingLogo">
    <div id="loadingBar">
        <div id="loadingProgress"></div>
    </div>
</div>

<!-- MAIN SITE -->
<div id="mainContent">

<div id="cursor"></div>
<canvas id="particles"></canvas>

<div style="text-align:center;padding-top:120px;">
    <h1 style="font-size:60px;">GOLDEN STATE RP</h1>

    <div id="serverStatus">Checking Server...</div>

    <a id="connectBtn"
       href="https://cfx.re/join/YOUR_CFX_CODE"
       target="_blank"
       class="btn"
       style="pointer-events:none;opacity:0.5;">
       Connect Now
    </a>
</div>

</div>

<script>

/* LOADING SCREEN REMOVE */
window.addEventListener("load",()=>{
    setTimeout(()=>{
        document.getElementById("loadingScreen").style.opacity="0";
        document.getElementById("mainContent").style.opacity="1";
        setTimeout(()=>{
            document.getElementById("loadingScreen").style.display="none";
        },800);
    },2500);
});

/* CURSOR */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
    cursor.style.left = e.clientX+"px";
    cursor.style.top = e.clientY+"px";
});

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
for(let i=0;i<90;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        s:Math.random()*2+1,
        vx:(Math.random()-0.5),
        vy:(Math.random()-0.5)
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>canvas.width) p.vx*=-1;
        if(p.y<0||p.y>canvas.height) p.vy*=-1;

        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.s,0,Math.PI*2);
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();

/* SERVER STATUS FIXED */
const SERVER_IP="23.27.211.19";
const SERVER_PORT="3086";

const statusText=document.getElementById("serverStatus");
const connectBtn=document.getElementById("connectBtn");

async function checkServer(){
    try{
        const response=await fetch(`http://${SERVER_IP}:${SERVER_PORT}/dynamic.json`);
        const data=await response.json();

        if(data && data.clients !== undefined){
            statusText.innerText=`?? Online — Players: ${data.clients} / ${data.sv_maxclients}`;
            connectBtn.style.pointerEvents="auto";
            connectBtn.style.opacity="1";
        }else{
            throw new Error();
        }

    }catch{
        statusText.innerText="?? Server Status Unavailable";
    }
}

checkServer();
setInterval(checkServer,15000);

</script>

</body>
</html>
