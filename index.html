<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Golden State RP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#0a0a0a;
    color:white;
    overflow-x:hidden;
    cursor:none;
}

/* NAVBAR */
nav{
    position:fixed;
    width:100%;
    padding:12px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:1000;
}

nav img{
    height:95px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:25px;
}

nav ul li{
    cursor:pointer;
    transition:0.3s;
}

nav ul li:hover{
    color:#aaa;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 20px;
}

.hero h1{
    font-size:65px;
    font-weight:800;
}

.hero p{
    margin-top:15px;
    color:#bbb;
    max-width:650px;
}

.buttons{
    margin-top:30px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    padding:12px 26px;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.btn-primary{
    background:white;
    color:black;
}

.btn-primary:hover{
    transform:scale(1.07);
}

.btn-outline{
    border:1px solid white;
    color:white;
}

.btn-outline:hover{
    background:white;
    color:black;
}

/* SECTIONS */
section{
    padding:120px 8%;
}

.center{
    text-align:center;
}

/* FLOATING LOGO */
#bg-logo{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:500px;
    opacity:0.05;
    z-index:-1;
    animation:floatLogo 8s ease-in-out infinite;
}

@keyframes floatLogo{
    0%{transform:translate(-50%,-50%) translateY(0);}
    50%{transform:translate(-50%,-50%) translateY(-20px);}
    100%{transform:translate(-50%,-50%) translateY(0);}
}

/* PARTICLES */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-2;
}

/* CUSTOM CURSOR */
#cursor{
    position:fixed;
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:9999;
}
</style>
</head>

<body>

<!-- Background Elements -->
<img src="logo.png" id="bg-logo">
<div id="cursor"></div>
<canvas id="particles"></canvas>

<!-- NAV -->
<nav>
    <img src="logo.png">
    <ul>
        <li onclick="scrollToSection('home')">Home</li>
        <li onclick="scrollToSection('rules')">Rules</li>
        <li onclick="location.href='applications.html'">Application Center</li>
        <li onclick="location.href='tickets.html'">Tickets</li>
    </ul>
</nav>

<!-- HERO -->
<div class="hero" id="home">
    <h1>GOLDEN STATE RP</h1>
    <p>Professional Roleplay • Departments • Custom Systems • Community Driven</p>

    <div class="buttons">
        <a href="YOUR_DISCORD_INVITE" target="_blank" class="btn btn-primary">Join Discord</a>
        <a href="https://cfx.re/join/YOUR_CODE" target="_blank" class="btn btn-outline">Connect to Server</a>
    </div>
</div>

<!-- RULES -->
<section id="rules" class="center">
    <h2>Server Rules</h2>
    <p style="color:#bbb;margin-top:20px;">
        Respect players • Realistic RP • No exploiting • Follow staff instructions
    </p>
</section>

<script>

/* CUSTOM CURSOR */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
    cursor.style.left = e.clientX+"px";
    cursor.style.top = e.clientY+"px";
});

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle{
    constructor(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*2;
        this.speedX = (Math.random()-0.5)*0.5;
        this.speedY = (Math.random()-0.5)*0.5;
    }
    update(){
        this.x+=this.speedX;
        this.y+=this.speedY;
        if(this.x<0||this.x>canvas.width) this.speedX*=-1;
        if(this.y<0||this.y>canvas.height) this.speedY*=-1;
    }
    draw(){
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function init(){
    for(let i=0;i<80;i++){
        particles.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});

/* SMOOTH SCROLL */
function scrollToSection(id){
    document.getElementById(id).scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
