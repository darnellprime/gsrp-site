<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden State RP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
    overflow-x:hidden;
    cursor:none;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    padding:12px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:1000;
}

nav img{
    height:95px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:25px;
}

nav ul li{
    cursor:pointer;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 20px;
}

.hero h1{
    font-size:65px;
    font-weight:800;
}

.hero p{
    margin-top:15px;
    color:#bbb;
}

/* BUTTONS */
.btn{
    padding:12px 26px;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
    display:inline-block;
    margin-top:20px;
}

.btn-primary{
    background:white;
    color:black;
}

.btn-primary:hover{
    transform:scale(1.07);
}

/* FLOATING LOGO */
#bg-logo{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:500px;
    opacity:0.05;
    z-index:-1;
    animation:floatLogo 8s ease-in-out infinite;
}

@keyframes floatLogo{
    0%{transform:translate(-50%,-50%) translateY(0);}
    50%{transform:translate(-50%,-50%) translateY(-20px);}
    100%{transform:translate(-50%,-50%) translateY(0);}
}

/* PARTICLES */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-2;
}

/* CURSOR */
#cursor{
    position:fixed;
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:9999;
}
</style>
</head>

<body>

<img src="logo.png" id="bg-logo">
<div id="cursor"></div>
<canvas id="particles"></canvas>

<nav>
    <img src="logo.png">
    <ul>
        <li onclick="location.href='index.html'">Home</li>
        <li onclick="location.href='applications.html'">Application Center</li>
        <li onclick="location.href='tickets.html'">Tickets</li>
    </ul>
</nav>

<div class="hero">
    <h1>GOLDEN STATE RP</h1>
    <p>Professional Roleplay • Custom Systems • Community Driven</p>

    <!-- SERVER STATUS -->
    <div id="serverStatus" style="margin-top:30px;font-size:18px;">
        Checking server...
    </div>

    <!-- CONNECT BUTTON -->
    <a id="connectBtn"
       href="https://cfx.re/join/YOUR_CFX_CODE"
       target="_blank"
       class="btn btn-primary"
       style="pointer-events:none;opacity:0.5;">
       Connect Now
    </a>

</div>

<script>

/* CUSTOM CURSOR */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e=>{
    cursor.style.left = e.clientX+"px";
    cursor.style.top = e.clientY+"px";
});

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles=[];

class Particle{
    constructor(){
        this.x=Math.random()*canvas.width;
        this.y=Math.random()*canvas.height;
        this.size=Math.random()*2+1;
        this.speedX=(Math.random()-0.5);
        this.speedY=(Math.random()-0.5);
    }
    update(){
        this.x+=this.speedX;
        this.y+=this.speedY;
        if(this.x<0||this.x>canvas.width) this.speedX*=-1;
        if(this.y<0||this.y>canvas.height) this.speedY*=-1;
    }
    draw(){
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function init(){
    for(let i=0;i<100;i++){
        particles.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init();
animate();

/* SERVER STATUS */
const SERVER_IP = "23.27.211.19";
const SERVER_PORT = "3086";

const statusText = document.getElementById("serverStatus");
const connectBtn = document.getElementById("connectBtn");

async function checkServer(){
    try{
        const response = await fetch(`http://${SERVER_IP}:${SERVER_PORT}/dynamic.json`);
        const data = await response.json();

        const players = data.clients;
        const max = data.sv_maxclients;

        statusText.innerText = `?? Online — Players: ${players} / ${max}`;

        connectBtn.style.pointerEvents="auto";
        connectBtn.style.opacity="1";

    } catch{
        statusText.innerText = "?? Server Offline";

        connectBtn.style.pointerEvents="none";
        connectBtn.style.opacity="0.5";
    }
}

checkServer();
setInterval(checkServer,15000);

</script>

</body>
</html>
