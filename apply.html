<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden State RP Application</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:450px;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:15px;
    backdrop-filter:blur(10px);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:25px;
    background:white;
    color:black;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<h2 id="title">Application</h2>

<select id="department">
    <option value="SASP">SASP</option>
    <option value="BCSO">BCSO</option>
    <option value="LSPD">LSPD</option>
    <option value="Staff">Staff</option>
    <option value="400 Hustlers">400 Hustlers</option>
    <option value="Grave Diggas">Grave Diggas</option>
    <option value="Blue Devils">Blue Devils</option>
    <option value="Department of Justice">Department of Justice</option>
    <option value="State Judge">State Judge</option>
    <option value="Government Candidacy Office">Government Candidacy Office</option>
    <option value="Development Core">Development Core</option>
</select>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="discord" placeholder="Discord Username">
<textarea id="reason" rows="4" placeholder="Why should we accept you?"></textarea>

<button onclick="submitApp()">Submit Application</button>

</div>

<script>

/* 🔥 PUT YOUR DISCORD WEBHOOK BELOW THIS LINE */
const webhook = "https://discord.com/api/webhooks/1479014216605372571/1EESmLywBplTXsMriDl3jJ0kmYFBsARJ5j1j2LUJqHWrFkb0C9aVD2CdOQZpu2skPemH";
/* 🔥 PUT YOUR DISCORD WEBHOOK ABOVE THIS LINE */

function submitApp(){

    const department = document.getElementById("department").value;
    const name = document.getElementById("name").value;
    const discord = document.getElementById("discord").value;
    const reason = document.getElementById("reason").value;

    if(!name || !discord || !reason){
        alert("Please fill out all fields.");
        return;
    }

    const payload = {
        content: "**New Application Received**",
        embeds: [{
            title: department + " Application",
            color: 0xffffff,
            fields: [
                { name: "Department", value: department },
                { name: "Name", value: name },
                { name: "Discord", value: discord },
                { name: "Reason", value: reason }
            ]
        }]
    };

    fetch(webhook, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(response => {
        if(response.ok){
            alert("Application Sent Successfully!");
            window.close();
        } else {
            alert("Error sending application.");
        }
    });

}

</script>

</body>
</html>
