<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:450px;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:15px;
    backdrop-filter:blur(10px);
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:25px;
    background:white;
    color:black;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Application Center</h2>

<select id="department">
    <option value="sasp">SASP</option>
    <option value="bcso">BCSO</option>
    <option value="lspd">LSPD</option>
</select>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="discord" placeholder="Discord Username">
<textarea id="reason" rows="4" placeholder="Why should we accept you?"></textarea>

<button onclick="submitApp()">Submit Application</button>

</div>

<script>

/* 🔥 PUT YOUR FTO ROLE ID HERE */
const FTO_ROLE_ID = "1469440813212635262";

/* 🔥 SEPARATE WEBHOOKS PER DEPARTMENT */
const webhooks = {
    sasp: "https://discord.com/api/webhooks/1479014216605372571/1EESmLywBplTXsMriDl3jJ0kmYFBsARJ5j1j2LUJqHWrFkb0C9aVD2CdOQZpu2skPemH",
    bcso: "https://discord.com/api/webhooks/1479014216605372571/1EESmLywBplTXsMriDl3jJ0kmYFBsARJ5j1j2LUJqHWrFkb0C9aVD2CdOQZpu2skPemH",
    lspd: "https://discord.com/api/webhooks/1479014216605372571/1EESmLywBplTXsMriDl3jJ0kmYFBsARJ5j1j2LUJqHWrFkb0C9aVD2CdOQZpu2skPemH"
};

function submitApp(){

    const department = document.getElementById("department").value;
    const name = document.getElementById("name").value;
    const discord = document.getElementById("discord").value;
    const reason = document.getElementById("reason").value;

    if(!name || !discord || !reason){
        alert("Please fill all fields.");
        return;
    }

    const webhook = webhooks[department];

    fetch(webhook,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            content:`<@&${FTO_ROLE_ID}>`,
            embeds:[{
                title: department.toUpperCase() + " Application",
                color:0xffffff,
                fields:[
                    {name:"Name",value:name},
                    {name:"Discord",value:discord},
                    {name:"Reason",value:reason}
                ]
            }]
        })
    });

    alert("Application Sent!");
    window.location.href="applications.html";
}

</script>

</body>
</html>
